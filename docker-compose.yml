version: "3.9"

services:
  # ── Production build (nginx) ──────────────────────────────
  ferrari-app:
    build:
      context: .
#      dockerfile: Dockerfile
#      target: production
    image: react-carapp
    container_name: devops-web-carapp
    ports:
      - "83:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Dev server (hot reload) ───────────────────────────────
  ferrari-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ferrari-dubai-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules        # anonymous volume keeps node_modules in container
    environment:
      - CHOKIDAR_USEPOLLING=true  # needed for hot reload inside Docker on some OSes
      - WATCHPACK_POLLING=true
    profiles:
      - dev                       # only starts with: docker compose --profile dev up
